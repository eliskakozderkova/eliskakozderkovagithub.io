<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kočičky</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #fdf6f0;
        }

        nav {
            background-color: #ffb6c1;
            padding: 10px;
        }

        nav a {
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

</head>
<body>

    <nav>
        <a href="index.html">Domů</a>
        <a href="kocicky.html">Kočičky 🐱</a>
    </nav>

    <h1>Kočičky 🐱</h1>

    <p id="text">Kočky jsou roztomilá a nezávislá zvířata.</p>

    <h2>Zajímavosti:</h2>
    <ul>
        <li>Kočky prospí až 16 hodin denně</li>
        <li>Mají výborný sluch</li>
        <li>Umí příst (vrnět)</li>
    </ul>

    <img id="obrazek" src="https://placekitten.com/300/200" alt="Kočička">

    <br>

    <button onclick="zmenObrazek()">Změň kočičku 🐾</button>
    <button onclick="zmenText()">Změň text ✨</button>

    <p>Kliknutí: <span id="pocitadlo">0</span></p>

    <script>
        let kliky = 0;

        function zmenObrazek() {
            let obrazek = document.getElementById("obrazek");
            obrazek.src = "https://placekitten.com/" + (300 + Math.floor(Math.random()*50)) + "/" + (200 + Math.floor(Math.random()*50));
            
            kliky++;
            document.getElementById("pocitadlo").innerText = kliky;
        }

        function zmenText() {
            let text = document.getElementById("text");
            text.innerText = "Kočičky jsou nejlepší kamarádi! 🐱💖";
            
            kliky++;
            document.getElementById("pocitadlo").innerText = kliky;
        }
    </script>

</body>
</html>
